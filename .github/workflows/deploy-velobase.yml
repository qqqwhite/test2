name: Deploy to Velobase Cloud (Multi-Pod)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VELOBASE_API_KEY: ${{ secrets.VELOBASE_API_KEY }}
      VELOBASE_DEPLOY_KEY: ${{ secrets.VELOBASE_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Velobase deploy config
        id: config
        run: |
          VELOBASE_KEY="${VELOBASE_API_KEY:-$VELOBASE_DEPLOY_KEY}"
          if [ -z "$VELOBASE_KEY" ]; then
            echo "Missing VELOBASE_API_KEY or VELOBASE_DEPLOY_KEY secret"
            exit 1
          fi
          CONFIG=$(curl -sf https://api.velobase.cloud/api/v1/deploy/config \
            -H "X-API-Key: $VELOBASE_KEY")
          echo "registry=$(echo $CONFIG | jq -r .registry)"     >> $GITHUB_OUTPUT
          echo "repository=$(echo $CONFIG | jq -r .repository)" >> $GITHUB_OUTPUT
          echo "username=$(echo $CONFIG | jq -r .username)"     >> $GITHUB_OUTPUT
          echo "password=$(echo $CONFIG | jq -r .password)"     >> $GITHUB_OUTPUT

      - name: Login to Velobase ACR
        run: |
          docker login ${{ steps.config.outputs.registry }} \
            -u ${{ steps.config.outputs.username }} \
            -p ${{ steps.config.outputs.password }}

      - name: Build & Push per-service images
        run: |
          REPO=${{ steps.config.outputs.repository }}
          SHA=${{ github.sha }}
          docker build -f Dockerfile.web    -t $REPO:web-$SHA .
          docker build -f Dockerfile.api    -t $REPO:api-$SHA .
          docker build -f Dockerfile.worker -t $REPO:worker-$SHA .
          docker push $REPO:web-$SHA
          docker push $REPO:api-$SHA
          docker push $REPO:worker-$SHA

      - name: Deploy (multi-pod)
        run: |
          SHA=${{ github.sha }}
          VELOBASE_KEY="${VELOBASE_API_KEY:-$VELOBASE_DEPLOY_KEY}"
          curl -f -X POST https://api.velobase.cloud/api/v1/deploy \
            -H "X-API-Key: $VELOBASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "image_tag": "'$SHA'",
              "services": [
                {"name": "web",    "mode": "web",    "port": 3000, "image_tag": "web-'$SHA'"},
                {"name": "api",    "mode": "api",    "port": 3002, "image_tag": "api-'$SHA'"},
                {"name": "worker", "mode": "worker", "port": 3001, "image_tag": "worker-'$SHA'"}
              ],
              "commit_sha": "'$SHA'"
            }'